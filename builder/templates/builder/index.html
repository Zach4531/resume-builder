{% extends 'builder/layout.html' %}

{% block body %}
  <div class="resumes">
    {% for resume in resumes %}
      <div class="resume-card">
        <h2>{{ resume.name }}</h2>
        <a href="{% url 'resume' resume.id %}">View Resume</a>
        <a href="#">Edit Resume</a>
      </div>
    {% endfor %}
  </div>
{% endblock %}
